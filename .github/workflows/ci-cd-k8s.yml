name: ci-cd-k8s

on:
  push:
    branches:
      - main

jobs:
  build-images:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: List of Files
      run: ls

    - name: Build Docker Image
      run: docker build -t common-app:1.0.${{ github.run_number }} .
